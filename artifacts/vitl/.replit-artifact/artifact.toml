kind = "mobile"
previewPath = "/"
title = "VITL - SA Health & Wellness"
version = "1.0.0"
id = "artifacts/vitl"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23104

[services.development]
run = "pnpm --filter @workspace/vitl run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vitl", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/vitl", "run", "serve" ]

[services.env]
PORT = "23104"
BASE_PATH = "/"
